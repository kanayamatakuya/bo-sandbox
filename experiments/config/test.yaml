# ============================================================================
# test
# ============================================================================

global:

  path: experiment/result/test
  n_init: 3
  noise: True
  max_it: 10
  has_cands: &has_cands True
  
  problem:
    name: Forrester
    noise_std: 0.01
    has_cands: *has_cands
    n_disc: 100

  model:
    covar_module:
      name: ScaleKernel
      outputscale_prior: {name: GammaPrior, concentration: 2.0, rate: 0.15}
      base_kernel:
        name: RBFKernel
        lemgthscale_prior: {name: LogNormalPrior, loc: 1.414, scale: 1.732}
    mean_module:
      name: ConstantMean

local:
  
  rand:
    acqf: {name: RandomSampling}

  pi:
    acqf: {name: ProbabilityOfImprovement}

  ei:
    acqf: {name: ExpectedImprovement}

  kg:
    acqf: {name: KnowledgeGradient}

  pes:
    acqf: {name: PredictiveEntropy}

  mes:
    acqf: {name: MaxValueEntropy}

  jes:
    acqf: {name: JointEntropy}
    